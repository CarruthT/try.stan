<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trystan.xyz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fffff8;
            color: #111111;
            margin: 0;
            padding: 0;
        }
        header, footer {
            background-color: #fffff8;
            padding: 10px 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        nav {
            text-align: left;
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #111111;
            font-family: monospace;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px;
        }
        h1 {
            font-family: monospace;
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.8;
        }
        footer nav {
            text-align: left;
        }

        .track {
            margin-bottom: 4px;
        }
        .track-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .play-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #111111;
            padding: 0;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .play-btn:hover { color: #555; }
        .play-btn svg { display: block; }

        .track-title {
            font-size: 18px;
            line-height: 1.8;
            margin: 0;
        }

        .track-image {
            display: none;
            margin-top: 8px;
            max-width: 400px;
        }
        .track-image img {
            width: 100%;
            display: block;
        }
        .track-image.visible { display: block; }

        .scrub-row {
            display: none;
            align-items: center;
            gap: 8px;
            max-width: 400px;
            margin-top: 6px;
        }
        .scrub-row.visible { display: flex; }

        .scrub-time {
            font-family: monospace;
            font-size: 11px;
            color: #555;
            white-space: nowrap;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 1px;
            background: #111111;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #111111;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #111111;
            border: none;
            cursor: pointer;
        }

        .scrub-slider { flex: 1; }

        .volume-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .volume-label {
            font-family: monospace;
            font-size: 13px;
            color: #555;
        }
        #volume { width: 80px; }
    </style>
    <link rel="icon" href="/images/favicon/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/images/favicon/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="/">[trystan.xyz]</a>
                <a href="/cv/">[cv]</a>
                <a href="/projects/">[projects]</a>
                <a href="/sound/">[sound]</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <h1>Sound</h1>

        <div class="volume-row">
            <span class="volume-label">vol</span>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="track" data-src="/sound/audio/()2.wav">
            <div class="track-row">
                <button class="play-btn" aria-label="Play">
                    <svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M0 0 L11 6.5 L0 13 Z"/></svg>
                </button>
                <p class="track-title">()</p>
            </div>
            <div class="track-image">
                <img src="/sound/images/().png" alt="()">
            </div>
            <div class="scrub-row">
                <span class="scrub-time current-time">0:00</span>
                <input type="range" class="scrub-slider" min="0" max="100" step="0.1" value="0">
                <span class="scrub-time total-time">0:00</span>
            </div>
        </div>

        <div class="track" data-src="/sound/audio/piece-2.wav">
            <div class="track-row">
                <button class="play-btn" aria-label="Play">
                    <svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M0 0 L11 6.5 L0 13 Z"/></svg>
                </button>
                <p class="track-title">Piece No. 2</p>
            </div>
            <div class="track-image">
                <img src="/sound/images/piece-2.jpg" alt="Piece No. 2">
            </div>
            <div class="scrub-row">
                <span class="scrub-time current-time">0:00</span>
                <input type="range" class="scrub-slider" min="0" max="100" step="0.1" value="0">
                <span class="scrub-time total-time">0:00</span>
            </div>
        </div>

        <div class="track" data-src="/sound/audio/piece-3.wav">
            <div class="track-row">
                <button class="play-btn" aria-label="Play">
                    <svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M0 0 L11 6.5 L0 13 Z"/></svg>
                </button>
                <p class="track-title">Piece No. 3</p>
            </div>
            <div class="track-image">
                <img src="/sound/images/piece-3.jpg" alt="Piece No. 3">
            </div>
            <div class="scrub-row">
                <span class="scrub-time current-time">0:00</span>
                <input type="range" class="scrub-slider" min="0" max="100" step="0.1" value="0">
                <span class="scrub-time total-time">0:00</span>
            </div>
        </div>

    </main>
    <footer>
        <div class="container">
            <nav>
                <a href="https://linkedin.com/in/Trystan-Carruth" target="_blank">[LinkedIn]</a>
                <a href="https://github.com/CarruthT" target="_blank">[GitHub]</a>
                <a href="mailto:trystaned@gmail.com">[Email]</a>
            </nav>
        </div>
    </footer>

    <script>
        var PLAY  = '<svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M0 0 L11 6.5 L0 13 Z"/></svg>';
        var PAUSE = '<svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><rect x="0" y="0" width="3.5" height="13"/><rect x="7.5" y="0" width="3.5" height="13"/></svg>';

        var volumeSlider = document.getElementById('volume');
        var current = null;

        function fmt(s) {
            if (!isFinite(s) || isNaN(s)) return '0:00';
            return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
        }

        function stopCurrent() {
            if (!current) return;
            current.audio.pause();
            current.btn.innerHTML = PLAY;
            current.btn.setAttribute('aria-label', 'Play');
            current.imgWrap.classList.remove('visible');
            current.scrubRow.classList.remove('visible');
            current.scrubSlider.value = 0;
            current.curTime.textContent = '0:00';
            current = null;
        }

        volumeSlider.addEventListener('input', function() {
            if (current) current.audio.volume = parseFloat(volumeSlider.value);
        });

        document.querySelectorAll('.track').forEach(function(trackEl) {
            var src         = trackEl.dataset.src;
            var btn         = trackEl.querySelector('.play-btn');
            var imgWrap     = trackEl.querySelector('.track-image');
            var scrubRow    = trackEl.querySelector('.scrub-row');
            var scrubSlider = trackEl.querySelector('.scrub-slider');
            var curTime     = trackEl.querySelector('.current-time');
            var totTime     = trackEl.querySelector('.total-time');
            var audio       = null;
            var scrubbing   = false;

            function getOrCreateAudio() {
                if (audio) return audio;
                audio = new Audio(src);
                audio.volume = parseFloat(volumeSlider.value);

                audio.addEventListener('loadedmetadata', function() {
                    totTime.textContent = fmt(audio.duration);
                });

                audio.addEventListener('timeupdate', function() {
                    if (scrubbing || !audio.duration) return;
                    scrubSlider.value = (audio.currentTime / audio.duration) * 100;
                    curTime.textContent = fmt(audio.currentTime);
                });

                audio.addEventListener('ended', function() {
                    stopCurrent();
                });

                return audio;
            }

            scrubSlider.addEventListener('mousedown', function() { scrubbing = true; });
            scrubSlider.addEventListener('touchstart', function() { scrubbing = true; });
            scrubSlider.addEventListener('mouseup',   function() { scrubbing = false; });
            scrubSlider.addEventListener('touchend',  function() { scrubbing = false; });

            scrubSlider.addEventListener('input', function() {
                if (!audio) return;
                curTime.textContent = fmt((parseFloat(scrubSlider.value) / 100) * audio.duration);
            });

            scrubSlider.addEventListener('change', function() {
                if (!audio || !audio.duration) return;
                audio.currentTime = (parseFloat(scrubSlider.value) / 100) * audio.duration;
                scrubbing = false;
            });

            btn.addEventListener('click', function() {
                var isPlaying = current && current.trackEl === trackEl;
                stopCurrent();
                if (!isPlaying) {
                    var a = getOrCreateAudio();
                    a.play().catch(function(e) { console.error(e); });
                    btn.innerHTML = PAUSE;
                    btn.setAttribute('aria-label', 'Pause');
                    imgWrap.classList.add('visible');
                    scrubRow.classList.add('visible');
                    current = {
                        trackEl:     trackEl,
                        audio:       a,
                        btn:         btn,
                        imgWrap:     imgWrap,
                        scrubRow:    scrubRow,
                        scrubSlider: scrubSlider,
                        curTime:     curTime
                    };
                }
            });
        });
    </script>
</body>
</html>
